version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: taxease_postgres
    environment:
      POSTGRES_USER: taxease
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taxease_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxease"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taxease_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
